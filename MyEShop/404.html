<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه یافت نشد</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f5f7fb;
        }

        .error-box {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 72px;
            margin: 0;
            color: #6a11cb;
        }

        h2 {
            color: #333;
        }

        a {
            color: #6a11cb;
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>صفحه مورد نظر یافت نشد</h2>
        <p>متأسفیم، صفحه‌ای که به دنبال آن هستید وجود ندارد.</p>
        <a href="/MyEShop/">بازگشت به صفحه اصلی</a>
    </div>
</body>
</html>
